name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  DATABASE_URL: file:local.db
  BETTER_AUTH_SECRET: a_very_long_better_auth_secret_for_testing_purposes

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Initialize DB
        run: npx drizzle-kit push

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps

      - name: Browser tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

